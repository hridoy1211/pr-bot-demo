name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

# Auto-fix capability requires contents:write; PR comments require pull-requests:write.
# Safe fixes (string equality) are committed to the branch; unsafe fixes (logic bugs)
# are only suggested.
permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run PR review bot
        env:
          # NEVER hardcode the key — it comes from the repo secret.
          ANTHROPIC_API_KEY: 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
          # GITHUB_TOKEN is injected automatically by Actions; the job's
          # `permissions` block above scopes it to read code + write PR comments.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/review-bot.js
