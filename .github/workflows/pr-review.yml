name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

# Auto-fix capability requires contents:write; PR comments require pull-requests:write.
# Safe fixes (string equality) are committed to the branch; unsafe fixes (logic bugs)
# are only suggested.
permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run PR review bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/review-bot.js
